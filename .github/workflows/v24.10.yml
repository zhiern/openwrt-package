name: v24.10

on:
  push:
    paths:
      - '.github/workflows/v24.10.yml'
      - 'v24.10.sh'
  schedule:
    - cron: 0 12 * * *
  workflow_dispatch:

jobs:
  job_Zero:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    runs-on: ubuntu-latest

    name: Update OpenWrt Package
    strategy:
      fail-fast: false
      matrix:
        target: [openwrt-24.10]
        
    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Initialization environment
      run : |
        git config --global user.email "zhiern@users.noreply.github.com"
        git config --global user.name "actions-user"
        sudo timedatectl set-timezone "Asia/Shanghai"
        
    - name: Clone packages
      run: |
        cd $GITHUB_WORKSPACE
        chmod +x .github/diy/v24.10.sh
        git clone -b openwrt-24.10 https://github.com/zhiern/openwrt-package.git ${{matrix.target}}
        cd ${{matrix.target}}
        git rm -r --cache * >/dev/null 2>&1 &
        rm -rf `find ./* -maxdepth 0 -type d ! -name "commit"` >/dev/null 2>&1
        $GITHUB_WORKSPACE/.github/diy/v24.10.sh

    - name: Upload
      env: 
        ACCESS_TOKEN: ${{ secrets.TOKEN_zhiern }}
      run: |
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        if git status --porcelain | grep .; then
          git add .
          git commit -am "update $(date '+%Y-%m-%d %H:%M:%S')"
          git push --quiet "https://${{ secrets.TOKEN_zhiern }}@github.com/zhiern/openwrt-package.git" HEAD:openwrt-24.10
        else
          echo "nothing to commit"
          exit 0
        fi || exit 0

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 1
